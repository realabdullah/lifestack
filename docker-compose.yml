version: '3.8'

services:
  exporter:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lifestack-exporter
    environment:
      - PORT=3000
      - LOG_LEVEL=info
      - GITHUB_USERNAME=${GITHUB_USERNAME}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - WAKATIME_USERNAME=${WAKATIME_USERNAME}
      - WAKATIME_API_KEY=${WAKATIME_API_KEY}
      - SPOTIFY_CLIENT_ID=${SPOTIFY_CLIENT_ID}
      - SPOTIFY_CLIENT_SECRET=${SPOTIFY_CLIENT_SECRET}
      - SPOTIFY_REFRESH_TOKEN=${SPOTIFY_REFRESH_TOKEN}
      - POLL_INTERVAL_GITHUB_MS=300000
      - POLL_INTERVAL_WAKATIME_MS=300000
      - POLL_INTERVAL_SPOTIFY_MS=30000
    ports:
      - "3000:3000"
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  prometheus:
    image: prom/prometheus:latest
    container_name: lifestack-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    ports:
      - "9090:9090"
    restart: unless-stopped
    depends_on:
      - exporter

  loki:
    image: grafana/loki:latest
    container_name: lifestack-loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped

  promtail:
    image: grafana/promtail:latest
    container_name: lifestack-promtail
    volumes:
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # We will mount a local promtail config to map the exporter container logs to Loki
      - ./promtail-config.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    restart: unless-stopped
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:latest
    container_name: lifestack-grafana
    ports:
      - "3001:3000" # Mapped to 3001 to avoid conflicting with the exporter on 3000
    volumes:
      - grafana-data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    restart: unless-stopped
    depends_on:
      - prometheus
      - loki

volumes:
  prometheus-data:
  grafana-data:
